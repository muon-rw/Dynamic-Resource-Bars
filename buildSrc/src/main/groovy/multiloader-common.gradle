plugins {
    id 'java-library'
    id 'maven-publish'
}

base {
    archivesName = "${mod_id}-${project.name}"
}

version = "${project.version}+${minecraft_version}"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(java_version)
        vendor = JvmVendorSpec.ADOPTIUM
    }
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
    exclusiveContent {
        forRepository {
            maven {
                url = 'https://repo.spongepowered.org/repository/maven-public'
            }
        }
        filter { includeGroupAndSubgroups('org.spongepowered') }
    }
    maven {
        url = uri("https://cursemaven.com")
        content {
            includeGroup("curse.maven")
        }
    }
    maven {
        url = uri("https://api.modrinth.com/maven")
        content {
            includeGroup("maven.modrinth")
        }
    }
    maven {
        url = uri("https://maven.ftb.dev/releases")
        content {
            includeGroup("dev.latvian.mods")
            includeGroup("dev.ftb.mods")
        }
    }
    maven {url = 'https://maven.blamejared.com'}
    maven {url = 'https://maven.fzzyhmstrs.me/'}
    maven {url = 'https://maven.fabricmc.net/'} // Required by Fzzy even in common
    maven {
        url = 'https://maven.muon.rip/snapshots/'
        content { includeGroupAndSubgroups 'dev.muon' }
    }
    maven {
        url = 'https://maven.muon.rip/releases/'
        content { includeGroupAndSubgroups 'dev.muon' }
    }

    // MixinSquared
    maven { url = "https://maven.bawnorton.com/releases" }
    // MixinSquared backup
    // maven { url = "https://maven.enjarai.dev/mirrors" }

    // Thermoo
    maven { url "https://jitpack.io/" }
    maven {url = 'https://maven.ladysnake.org/releases'}

    // mavenLocal is intentionally last so remote snapshots win on a same-version
    // coord — useful when bouncing between machines via the snapshots repo.
    mavenLocal()
}

// Re-check -SNAPSHOT metadata on every build (default TTL is 24h). Only affects
// changing modules; release coords stay fully cached. Pair with the snapshots repo
// content filter above so this only impacts dev.muon resolution.
configurations.all {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}

sourcesJar {
    from(rootProject.file('LICENSE')) {
        rename { "${it}_${mod_name}" }
    }
}

jar {
    from(rootProject.file('LICENSE')) {
        rename { "${it}_${mod_name}" }
    }

    manifest {
        attributes([
                'Specification-Title'   : mod_name,
                'Specification-Vendor'  : mod_author,
                'Specification-Version' : project.jar.archiveVersion,
                'Implementation-Title'  : project.name,
                'Implementation-Version': project.jar.archiveVersion,
                'Implementation-Vendor' : mod_author,
                'Built-On-Minecraft'    : minecraft_version
        ])
    }
}

processResources {
    var expandProps = [
            'version'                      : version,
            'group'                        : project.group, //Else we target the task's group.
            'minecraft_version'            : minecraft_version,
            'minecraft_version_range'      : minecraft_version_range,
            'fabric_version'               : fabric_version,
            'fabric_loader_version'        : fabric_loader_version,
            'mod_name'                     : mod_name,
            'mod_author'                   : mod_author,
            'mod_id'                       : mod_id,
            'license'                      : license,
            'description'                  : project.description,
            'neoforge_version'             : neoforge_version,
            'neoforge_loader_version_range': neoforge_loader_version_range,
            'credits'                      : credits,
            'java_version'                 : java_version,
            'github_owner'                 : github_owner,
            'github_repo'                  : github_repo
    ]

    var jsonExpandProps = expandProps.collectEntries {
        key, value -> [(key): value instanceof String ? value.replace("\n", "\\\\n") : value]
    }

    filesMatching(['META-INF/mods.toml', 'META-INF/neoforge.mods.toml']) {
        expand expandProps
    }

    filesMatching(['pack.mcmeta', 'fabric.mod.json', '*.mixins.json']) {
        expand jsonExpandProps
    }

    inputs.properties(expandProps)
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifactId base.archivesName.get()
            from components.java
        }
    }
    repositories {
        maven {
            url System.getenv('MAVEN_URL')
            credentials {
                username = System.getenv("MAVEN_USERNAME")
                password = System.getenv("MAVEN_PASSWORD")
            }
        }

    }
}


// Publishing is configured once at the root project (see build.gradle) — the
// mod-publish-plugin docs recommend centralising multi-loader setup there with
// named curseforge/modrinth/github entries and shared option blocks.
